name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build packages and API
        run: pnpm turbo run build --filter=@platform/api --filter=@platform/contracts --filter=@platform/auth-client --filter=@platform/database-pg --filter=@platform/database-sqlite --filter=@platform/sync-engine --filter=@platform/shell-sdk --filter=@platform/ui --filter=@platform/permissions --filter=@platform/shared-types --filter=@platform/module-sample
