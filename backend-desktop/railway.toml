# Railway config when Root Directory = backend-desktop
#
# Railway UI → Settings:
#   Root Directory: backend-desktop
#   Builder: Dockerfile
#   Dockerfile path: Dockerfile

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["api/**", "packages/**", "package.json", "pnpm-lock.yaml", "pnpm-workspace.yaml", "turbo.json"]

[deploy]
startCommand = "node /app/api/scripts/start-railway.mjs"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
