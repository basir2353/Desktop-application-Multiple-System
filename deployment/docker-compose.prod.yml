services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-platform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-platform}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - platform_pg_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-platform} -d ${POSTGRES_DB:-platform}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: backend/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL}
      PORT: ${PORT:-3000}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?Set JWT_ACCESS_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL_DAYS: ${JWT_REFRESH_TTL_DAYS:-30}
      SEED_USER_EMAIL: ${SEED_USER_EMAIL:-admin@platform.local}
      SEED_USER_PASSWORD: ${SEED_USER_PASSWORD:-changeme-please-01}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-}
    ports:
      - "${API_HOST_PORT:-3000}:3000"
    volumes:
      - api_uploads:/app/backend/api/data/uploads

  api-migrate:
    build:
      context: ..
      dockerfile: backend/api/Dockerfile
    profiles: ["tools"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL}
    entrypoint: ["sh", "-c"]
    command:
      - |
        cd /app && pnpm --filter @platform/database-pg push

  web:
    build:
      context: ..
      dockerfile: apps/launcher/Dockerfile.web
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:?Set VITE_API_BASE_URL}
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_HOST_PORT:-8080}:80"

volumes:
  platform_pg_prod: {}
  api_uploads: {}
