[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Schema push can take 1–2 min on first deploy; run before the container serves traffic.
preDeployCommand = "cd /app && pnpm --filter @platform/database-pg push"
startCommand = "node dist/main.js"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
