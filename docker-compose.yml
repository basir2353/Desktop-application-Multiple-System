services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
      POSTGRES_DB: platform
    # Host port is configurable (see .env.example). Default 15432 avoids common 5432/5433 conflicts.
    ports:
      - "${POSTGRES_HOST_PORT:-15432}:5432"
    volumes:
      - platform_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform -d platform"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  platform_pg: {}
